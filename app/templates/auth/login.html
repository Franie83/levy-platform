{% extends "base.html" %} 
 
{% block auth_content %} 
<div class="container mt-5"> 
    <div class="row justify-content-center"> 
        <div class="col-md-6"> 
            <div class="card"> 
                <div class="card-header bg-primary text-white"> 
                    <h4 class="mb-0">Login</h4> 
                </div> 
                <div class="card-body"> 
                    <form method="POST" action="{{ url_for('auth.login') }}"> 
                        <div class="mb-3"> 
                            <label for="nin" class="form-label">NIN (National ID Number)</label> 
                            <input type="text" class="form-control" id="nin" name="nin" value="12345678901" required> 
                        </div> 
                        <div class="mb-3"> 
                            <label for="password" class="form-label">Password</label> 
                            <input type="password" class="form-control" id="password" name="password" value="password123" required> 
                        </div> 
                        <div class="mb-3 form-check"> 
                            <input type="checkbox" class="form-check-input" id="remember" name="remember"> 
                            <label class="form-check-label" for="remember">Remember Me</label> 
                        </div> 
                        <button type="submit" class="btn btn-primary">Login</button> 
                        <a href="{{ url_for('auth.register') }}" class="btn btn-link">Don't have an account? Register</a> 
                    </form> 
                </div> 
            </div> 
        </div> 
    </div> 
</div> 
{% endblock %}
